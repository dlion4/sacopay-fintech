services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: django-app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    env_file:
      - ./app/.env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: sacco_db
      POSTGRES_USER: sacco_user
      POSTGRES_PASSWORD: sacco_pass
    ports:
      - "5432:5432"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    