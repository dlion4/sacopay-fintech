<div class="login-wrapper" data-bs-theme="dark">
  <div class="glass-card">
      <div class="position-relative z-1">
          <div class="text-center mb-4">
              <a routerLink="/" class="text-decoration-none">
                  <i class="bi bi-wallet2 text-neon fs-1 mb-2"></i>
                  <h4 class="fw-bold text-white">SACCO<span class="text-neon">Pay</span></h4>
              </a>
          </div>

          <h3 class="fw-bold mb-1 text-center text-white">Sign In</h3>
          <p style="color: #888; font-size: 0.95rem;" class="mb-4 text-center">Enter your credentials to access your portal</p>

          <div class="auth-mode-container">
              <button class="mode-btn" 
                      [class.active]="loginType === 'member'" 
                      (click)="setLoginType('member')">Member</button>
              <button class="mode-btn" 
                      [class.active]="loginType === 'staff'" 
                      (click)="setLoginType('staff')">Staff</button>
          </div>

          <form (submit)="$event.preventDefault(); handleLogin()">
              <div class="mb-4">
                  <label class="form-label text-secondary small text-uppercase fw-semibold mb-2">
                      {{ loginType === 'member' ? 'Member ID / Phone' : 'Staff Email / ID' }}
                  </label>
                  <div class="input-group">
                      <span class="input-group-text border-end-0 rounded-end-0 bg-transparent">
                          <i class="bi" [ngClass]="loginType === 'member' ? 'bi-person-badge' : 'bi-envelope'"></i>
                      </span>
                      <input type="text" class="form-control border-start-0 rounded-start-0 bg-transparent text-white" 
                             [placeholder]="loginType === 'member' ? 'e.g. 0712345678 or R-001' : 'staff@sacco.co.ke'">
                  </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                  <label class="form-label text-secondary small text-uppercase fw-semibold mb-0">Security Method</label>
                  <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 2px;">
                      <button type="button" class="btn btn-sm text-white" 
                              [style.background]="authMethod === 'pin' ? 'rgba(255,255,255,0.1)' : 'transparent'"
                              (click)="setAuthMethod('pin')">PIN</button>
                      <button type="button" class="btn btn-sm text-white" 
                              [style.background]="authMethod === 'password' ? 'rgba(255,255,255,0.1)' : 'transparent'"
                              (click)="setAuthMethod('password')">Pass</button>
                  </div>
              </div>

              <div *ngIf="authMethod === 'pin'" class="pin-container">
                  <input type="password" class="pin-input text-white" id="pin1" maxlength="1" (input)="moveFocus($event, 'pin2')" autocomplete="off">
                  <input type="password" class="pin-input text-white" id="pin2" maxlength="1" (input)="moveFocus($event, 'pin3')" autocomplete="off">
                  <input type="password" class="pin-input text-white" id="pin3" maxlength="1" (input)="moveFocus($event, 'pin4')" autocomplete="off">
                  <input type="password" class="pin-input text-white" id="pin4" maxlength="1" autocomplete="off">
              </div>

              <div *ngIf="authMethod === 'password'" class="mb-4">
                  <div class="input-group">
                      <span class="input-group-text border-end-0 rounded-end-0 bg-transparent"><i class="bi bi-shield-lock"></i></span>
                      <input [type]="showPassword ? 'text' : 'password'" class="form-control border-start-0 border-end-0 rounded-0 bg-transparent text-white" placeholder="Enter your password">
                      <button class="btn password-eye-btn" type="button" (click)="togglePasswordVisibility()">
                          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                      </button>
                  </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2);">
                      <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                  </div>
                  <a routerLink="/auth/forgot-password" class="text-neon text-decoration-none small">Forgot details?</a>
              </div>

              <button type="submit" class="btn-neon mb-4">
                  Secure Login <i class="bi bi-arrow-right ms-2"></i>
              </button>

              <div class="text-center text-secondary small">
                  Don't have an account? <a routerLink="/auth/register" class="text-white text-decoration-none fw-bold ms-1" style="transition: 0.3s;" onmouseover="this.style.color='#00ff66'" onmouseout="this.style.color='#fff'">Open Account</a>
              </div>
          </form>
      </div>
  </div>
</div>
