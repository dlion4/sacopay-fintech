<aside class="sp-sidebar" [class.show]="isOpen" [class.minimized]="isMinimized" id="sidebar">

  <!-- Brand Header -->
  <a routerLink="/member/dashboard" class="sidebar-brand">
    <div class="brand-logo">S</div>
    <div class="brand-text" [class.d-none]="isMinimized">
      <div class="brand-title">Sacco<span>Pay</span></div>
      <div class="brand-subtitle">Member Portal</div>
    </div>
    <button class="minimize-btn d-none d-lg-flex" 
            (click)="toggleMinimize(); $event.preventDefault(); $event.stopPropagation();"
            title="{{ isMinimized ? 'Expand' : 'Minimize' }}">
      <i class="bi" [class.bi-chevron-left]="!isMinimized" [class.bi-chevron-right]="isMinimized"></i>
    </button>
  </a>

  <!-- Member Badge -->
  <div class="member-badge" [class.justify-content-center]="isMinimized">
    <div class="member-info" [class.d-none]="isMinimized">
      <div class="member-name">{{ userName }}</div>
      <div class="member-id">{{ memberId }}</div>
      <div class="member-status">
        <span class="status-dot"></span>
        Active
      </div>
    </div>
  </div>

  <!-- Scrollable Navigation -->
  <nav class="sidebar-nav">
    <div class="nav-section" *ngFor="let section of navSections">
      <div class="section-label" [class.d-none]="isMinimized">{{ section.label }}</div>

      <a *ngFor="let link of section.links"
         [routerLink]="link.path"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: link.exact || false }"
         class="nav-link"
         (click)="onNavLinkClick()">
        <span class="nav-icon"><i class="bi {{ link.icon }}"></i></span>
        <span class="nav-text flex-grow-1" [class.d-none]="isMinimized">{{ link.label }}</span>

        <!-- Badge for minimized state -->
        <span class="nav-badge-dot" *ngIf="hasBadge(link) && isMinimized"></span>
        <!-- Badge for expanded state -->
        <span class="nav-badge" *ngIf="hasBadge(link) && !isMinimized">{{ link.badge }}</span>
      </a>
    </div>
  </nav>

  <!-- Logout Footer -->
  <div class="sidebar-footer">
    <a routerLink="/auth/login" class="nav-link logout-link" (click)="onNavLinkClick()">
      <span class="nav-icon"><i class="bi bi-box-arrow-left"></i></span>
      <span class="nav-text" [class.d-none]="isMinimized">Logout</span>
    </a>
  </div>
</aside>
