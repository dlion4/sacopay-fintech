<!-- member-header.component.html -->
<!-- Top header with hamburger menu and minimize toggle -->

<header class="sp-header">
  <div class="d-flex align-items-center gap-2">
    <!-- Mobile hamburger -->
    <button class="btn btn-link btn-sm p-2 d-lg-none hamburger-btn" (click)="toggleMenu.emit()">
      <i class="bi bi-list" style="font-size: 24px; color: var(--text-primary);"></i>
    </button>

    <!-- Desktop sidebar toggle - prominent button -->
    <button class="btn btn-sm d-none d-lg-flex align-items-center gap-2 sidebar-toggle-btn" 
            (click)="toggleMinimize.emit()"
            [class.minimized]="isSidebarMinimized"
            [title]="isSidebarMinimized ? 'Expand sidebar' : 'Minimize sidebar'">
      <i class="bi" 
         [class.bi-chevron-left]="!isSidebarMinimized" 
         [class.bi-chevron-right]="isSidebarMinimized"></i>
      <span class="toggle-text" [class.d-none]="isSidebarMinimized">Collapse</span>
    </button>

    <!-- Page title area -->
    <div class="page-title">
      <h5 class="mb-0 fw-bold" style="font-size: 18px; color: var(--text-primary);">{{ pageTitle }}</h5>
    </div>
  </div>

  <div class="d-flex align-items-center gap-3">
    <!-- Search -->
    <div class="search-box d-none d-md-flex">
      <i class="bi bi-search" style="font-size: 14px; color: var(--text-muted);"></i>
      <input type="text" placeholder="Search..." class="form-control form-control-sm border-0 bg-transparent">
    </div>

    <!-- Notifications -->
    <button class="btn btn-link btn-sm p-2 position-relative" (click)="openNotifications()">
      <i class="bi bi-bell" style="font-size: 20px; color: var(--text-muted);"></i>
      <span class="notification-dot" *ngIf="notificationCount > 0"></span>
    </button>

    <!-- Profile dropdown -->
    <div class="dropdown">
      <button class="btn btn-link btn-sm p-0 d-flex align-items-center gap-2" data-bs-toggle="dropdown">
        <div class="header-avatar">JK</div>
        <span class="d-none d-md-inline fw-semibold" style="font-size: 13px;">John Kamau</span>
        <i class="bi bi-chevron-down d-none d-md-inline" style="font-size: 12px; color: var(--text-muted);"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg" style="border-radius: 12px;">
        <li><a class="dropdown-item" routerLink="/member/profile"><i class="bi bi-person me-2"></i> Profile</a></li>
        <li><a class="dropdown-item" routerLink="/member/settings"><i class="bi bi-gear me-2"></i> Settings</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" routerLink="/auth/login"><i class="bi bi-box-arrow-left me-2"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</header>
