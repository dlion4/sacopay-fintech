<header class="admin-header">
  <div class="header-content">
    <div class="header-left">
      <!-- Mobile hamburger -->
      <button class="header-toggle-btn d-lg-none" (click)="toggleMenu.emit()" title="Toggle menu">
        <i class="bi bi-list" style="font-size:1.1rem"></i>
      </button>
      
      <!-- Desktop collapse -->
      <button class="header-toggle-btn d-none d-lg-flex" 
              (click)="toggleMinimize.emit()"
              [class.minimized]="isSidebarMinimized"
              [title]="isSidebarMinimized ? 'Expand sidebar' : 'Collapse sidebar'">
        <i class="bi" [class.bi-layout-sidebar]="!isSidebarMinimized" [class.bi-layout-sidebar-reverse]="isSidebarMinimized"></i>
      </button>

      <div class="header-breadcrumb">
        <div class="page-title">{{ pageTitle }}</div>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item" *ngFor="let crumb of breadcrumb; let last = last" [class.active]="last">
              <a href="#" *ngIf="!last">{{ crumb }}</a>
              <span *ngIf="last">{{ crumb }}</span>
            </li>
          </ol>
        </nav>
      </div>
    </div>

    <div class="header-right">
      <span class="live-badge d-none d-md-flex">
        <i class="bi bi-circle-fill" style="font-size:0.5rem"></i> LIVE
      </span>

      <div class="search-wrap d-none d-md-flex">
        <i class="bi bi-search search-icon"></i>
        <input type="search" placeholder="Search deposits…" />
      </div>

      <button class="icon-btn" title="Notifications" (click)="openNotifications()">
        <i class="bi bi-bell"></i>
        <span class="badge-dot" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
      </button>

      <button class="icon-btn" title="Export">
        <i class="bi bi-download"></i>
      </button>

      <div class="user-avatar" [title]="userName + ' — General Manager'">
        {{ userInitials }}
      </div>
    </div>
  </div>
</header>
