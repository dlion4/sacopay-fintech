<!-- admin-sidebar.component.html -->
<aside class="admin-sidebar" [class.show]="isOpen" [class.minimized]="isMinimized">
  <!-- Brand Header -->
  <a class="sidebar-brand">
    <div class="sidebar-brand-logo">S</div>
    <div class="sidebar-brand-text">
      <h5>SACCOPay</h5>
      <!-- <p>Admin Panel v6.1</p> -->
    </div>
    <button class="minimize-btn" (click)="toggleMinimizeEvent.emit()">
      <i class="icon-chevron-left"></i>
    </button>
  </a>

  <!-- User Badge -->


  <!-- User Details (IDs with copy) -->
  <div class="user-details" *ngIf="!isMinimized">
    <div class="detail-row">
      <span class="detail-label">Default role</span>
      <span class="detail-value">{{ userRole }}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">saccopay id</span>
      <div class="detail-value-with-copy">
        <span class="detail-value">{{ saccopayId }}</span>
        <button 
          class="copy-btn" 
          (click)="copyToClipboard(saccopayId, 'saccopayId')" 
          [class.copied]="copiedField === 'saccopayId'"
          title="Copy SACCOPay ID">
          <i class="icon-copy visual-fallback-copy" *ngIf="copiedField !== 'saccopayId'"></i>
          <i class="icon-check visual-fallback-check" *ngIf="copiedField === 'saccopayId'"></i>
        </button>
      </div>
    </div>
    <div class="detail-row">
      <span class="detail-label">saccopay wallet id</span>
      <div class="detail-value-with-copy">
        <span class="detail-value">{{ saccopayWalletId }}</span>
        <button 
          class="copy-btn" 
          (click)="copyToClipboard(saccopayWalletId, 'saccopayWalletId')" 
          [class.copied]="copiedField === 'saccopayWalletId'"
          title="Copy Wallet ID">
          <i class="icon-copy visual-fallback-copy" *ngIf="copiedField !== 'saccopayWalletId'"></i>
          <i class="icon-check visual-fallback-check" *ngIf="copiedField === 'saccopayWalletId'"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <div class="nav-section" *ngFor="let section of navSections">
      <h4 class="nav-section-title" *ngIf="!isMinimized">{{ section.title }}</h4>
      <ul>
        <li class="nav-item" *ngFor="let item of section.items">
          <a [routerLink]="item.route" class="nav-link" [class.active]="item.active">
            <span class="nav-icon"><i [class]="item.icon"></i></span>
            <span class="nav-label" *ngIf="!isMinimized">{{ item.label }}</span>
            <span class="nav-badge" *ngIf="item.badge && !isMinimized">{{ item.badge }}</span>
            <span class="nav-badge-dot" *ngIf="item.hasNotification"></span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="!isMinimized">
    <span class="sidebar-footer-text">© 2026 SACCOPay</span>
  </div>
</aside>
